components:
  schemas:
    notifications:
      description: |
        Returns 0 or more notifications
      example:
        sendDate: 0
        subject: subject
        id: id
        email: email
        content: content
      properties:
        id:
          description: An id generated by a mongodb objectId
          format: hexadecimal
          type: string
        sendDate:
          format: unixtime
          type: integer
        email:
          format: email
          type: string
        subject:
          format: string
          type: string
        content:
          format: html
          type: string
      required:
        - content
        - email
        - id
        - sendDate
        - subject
      type: object
    oauth2TokenBody:
      properties:
        client_id:
          format: string
          type: string
        client_secret:
          format: string
          type: string
        grant_type:
          default: client_credentials
          format: string
          type: string
      required:
        - client_id
        - client_secret
        - grant_type
      type: object
    oauth2TokenResponse:
      example:
        access_token: access_token
        scope: scope
        token_type: token_type
        expires_in: 0
      properties:
        access_token:
          format: string
          type: string
        expires_in:
          format: int64
          type: integer
        token_type:
          format: string
          type: string
        scope:
          format: string
          type: string
      type: object
    oauth2TokenError:
      properties:
        error:
          format: string
          type: string
        error_description:
          format: string
          type: string
      type: object
    assessor-type-response:
      properties:
        id:
          format: integer
          type: integer
          example: 1
        title:
          format: string
          type: string
          example: Name of the assessor type
        description:
          format: string
          type: string
          example: Description of the assessor type
        updatedBy:
          format: integer
          type: integer
          example: 5
        flowDefault:
          format: boolean
          type: boolean
          example: true
        color:
          format: string
          type: string
          example: '#000000'
        privileges:
          type: object
          properties:
            accessToSimilarityReport:
              format: boolean
              type: boolean
              example: true
            visibleToParticipant:
              format: boolean
              type: boolean
              example: true
            coAssessorGradeTransparency:
              format: boolean
              type: boolean
              example: true
            modifyAutoScore:
              format: boolean
              type: boolean
              example: true
        feedbackSharing:
          type: object
          properties:
            defaultSelection:
              type: string
              example: PARTICIPANTS
              enum:
                - PRIVATE
                - PARTICIPANTS
                - COASSESSORS
            available:
              type: object
              properties:
                private:
                  format: boolean
                  type: boolean
                  example: true
                participants:
                  format: boolean
                  type: boolean
                  example: true
                coAssessors:
                  format: boolean
                  type: boolean
                  example: true
        updatedAt:
          format: datetime
          type: string
          example: '2021-01-01T00:00:00Z'
        createdAt:
          format: datetime
          type: string
          example: '2021-01-01T00:00:00Z'
    assessor-types-response:
      items:
        $ref: '#/components/schemas/assessor-type-response'
      type: array
    api-error:
      properties:
        reason:
          format: string
          type: string
          example: reason
        message:
          format: string
          type: string
          example: message
      type: object
    api-error-response:
      properties:
        code:
          format: integer
          type: integer
          example: 400
        message:
          format: string
          type: string
          example: error message
        errors:
          items:
            $ref: '#/components/schemas/api-error'
          type: array
      type: object
    assessor-types-get-response:
      properties:
        success:
          format: boolean
          type: boolean
          example: true
        data:
          $ref: '#/components/schemas/assessor-types-response'
        error:
          $ref: '#/components/schemas/api-error-response'
      type: object
    general-api-error-response:
      properties:
        success:
          example: false
          format: boolean
          type: boolean
        data:
          type: object
          example: null
        error:
          $ref: '#/components/schemas/api-error-response'
      type: object
    create-flow-request:
      properties:
        title:
          format: string
          type: string
        subTitle:
          format: string
          type: string
        type:
          format: integer
          type: integer
        managers:
          description: The ids of the users to be added as managers
          items:
            type: integer
          type: array
      required:
        - managers
        - title
        - type
      type: object
    create-flow-response:
      example:
        flowId: 0
      properties:
        flowId:
          format: integer
          type: integer
      type: object
    flow-purposes-response:
      properties:
        id:
          format: integer
          type: integer
          example: 1
        name:
          format: string
          type: string
          example: Coursework
        value:
          format: string
          type: string
          example: COURSE_WORK
      type: object
    license-flow-purposes-api-response:
      properties:
        success:
          format: boolean
          type: boolean
          example: true
        data:
          description: A list of flow-purposes
          items:
            $ref: '#/components/schemas/flow-purposes-response'
          type: array
        error:
          $ref: '#/components/schemas/api-error-response'
    flow-type-response:
      properties:
        id:
          format: integer
          type: integer
          example: 1
        name:
          format: string
          type: string
          example: FLOWassign
        description:
          format: string
          type: string
          example: Description.
      type: object
    license-flow-types-api-response:
      properties:
        success:
          format: boolean
          type: boolean
        data:
          description: A list of flow-types
          items:
            $ref: '#/components/schemas/flow-type-response'
          type: array
        error:
          $ref: '#/components/schemas/api-error-response'
      type: object
    flow-advanced-search-request:
