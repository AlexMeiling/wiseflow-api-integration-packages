          type: integer
        participantEndDate:
          description: Participant end date (Epoch time)
          format: integer
          type: integer
        assessmentStartDate:
          description: Assessment start date (Epoch time)
          format: integer
          type: integer
        assessmentEndDate:
          description: Assessment end date (Epoch time)
          format: integer
          type: integer
        activityReference:
