          format: integer
          type: integer
        type:
          format: integer
          type: integer
        state:
          format: integer
          type: integer
        variant:
          format: integer
          type: integer
        purpose:
          format: integer
          type: integer
      type: object
    flow-advanced-search-response-array:
      items:
        $ref: '#/components/schemas/flow-advanced-search-response'
      type: array
