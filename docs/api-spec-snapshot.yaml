        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/get-dfba-api-response'
          description: Returns direct flow based authentication data of participants for a specific flow
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/error-api-response-no-data'
          description: Invalid query or URL parameters
        '403':
          content:
            application/json:
              schema:
