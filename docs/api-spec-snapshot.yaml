        Add one or more users to a flow as participant.

          If a user fails to be added as participant, the response will contain one of the six error codes:

          AP001 = User not found

          AP002 = Already participant on flow

          AP003 = Multiple users with same identifier found. It is therefore not possible to determine which user to add as participant.

          AP004 = Unique emails are required on license in order to lookup users by email

          AP005 = UserDataTypeId is not present on license

          AP006 = Request must have either email or userData
      parameters:
        - description: Identifies the flow using a flowId.
          in: path
          name: flowId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/participants-add-request'
        description: |-
          An array of users that should be added as participants to the flow. It is recommended to add all users in one call.

            To identify the user, provide either userData information or a email address if the license is setup with unique emails.

            If the license is setup with support for unique exam id this can passed along to be set on the added participant
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/participants-add-response'
          description: The request has been executed. The responses contain the participantIds for those who have been added and information about those who did not, including why they have not been added
