openapi: 3.0.1
info:
  title: WISEflow API
  version: 1.34.0
  description: |
    For details on authentication, best practices, rate limits, and webhooks, see the [WISEflow Service Center](https://help.wiseflow.net/service-centre/api).
servers:
  - url: https://europe-api.wiseflow.net/v1
    description: Production
  - url: https://europe-stage-api.wiseflow.net/v1
    description: Staging
  - url: '{scheme}://{host}{base}'
    description: Custom
    variables:
      scheme:
        default: http
        enum:
          - http
          - https
      host:
        default: localhost:8080
      base:
        default: ''
security:
  - oauth: []
  - token: []
tags:
  - name: Authorization
    description: In this section you will find endpoints for authorization
  - name: License
    description: In this section you will find endpoints for managing your license
  - name: User Information
    description: In this section you will find endpoints for getting user information
  - name: User Management
    description: In this section you will find endpoints for managing users
  - name: Flow Creation
    description: In this section you will find endpoints for creating flows
  - name: Flow Information
    description: In this section you will find endpoints for getting flow information
  - name: Flow Management
    description: In this section you will find endpoints for setting up a flow
  - name: Sequence of Flows (FLOWcombine)
    description: In this section you will find endpoints for managing Sequence of Flows (FLOWcombine)
  - name: Participants
    description: In this section you will find endpoints for managing participants on a flow
  - name: Reviewers
    description: In this section you will find endpoints for managing reviewers on a flow
  - name: Assessors
    description: In this section you will find endpoints for managing assessors on a flow
  - name: Assessor Groups
    description: In this section you will find endpoints for managing assessor groups on a flow
  - name: Authors
    description: In this section you will find endpoints for managing authors on a flow
  - name: Invigilators
    description: In this section you will find endpoints for managing invigilators on a flow
  - name: Managers
    description: In this section you will find endpoints for managing managers on a flow
  - name: Room
    description: In this section you will find endpoints for managing rooms on the license and on flows
  - name: File
    description: In this section you will find endpoints for files submitted by exam participants
  - name: Submissions
    description: In this section you will find endpoints for managing submission data
  - name: Invigilation
    description: In this section you will find endpoints for managing user data from the invigilation process
  - name: Device monitor
    description: In this section you will find endpoints for managing device monitor data
  - name: Marking Process
    description: In this section you will find endpoints related to the marking process
  - name: Marking Data
    description: In this section you will find endpoints for managing marking data produced by assessors
  - name: Grade Justification
    description: In this section you will find endpoints for managing grade justifications
  - name: System Logs
    description: In this section you will find endpoints for extracting different log data. Be aware that these are raw logs and not for application development. Log entries are available 16 weeks from their creation timestamp.
  - name: Flow External Sources
    description: In this section you will find endpoints related to the Flow External Sources module
  - name: FLOWoral
    description: In this section you will find endpoints for managing FLOWoral specific parts on a flow
  - name: Webhooks
    description: In this section you will find endpoints for managing webhooks
paths:
  /oauth2/token:
    post:
      security: []
      description: This endpoint is used to get a bearer token. The token is used to authorize requests to the API. The token is valid for 1 hour
      operationId: getBearerToken
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/oauth2TokenBody'
        description: The body takes the client_id and the client_secret which are visible when creating a new token from the License Administration page in WISEflow. The grant_type will always be "client_credentials"
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oauth2TokenResponse'
          description: Successful operation
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/oauth2TokenError'
          description: Bad request
      summary: Get a bearer token
      tags:
        - Authorization
      x-codegen-request-body-name: body
  /license/assessor-types:
    get:
      description: Get all assessor types associated with the license
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/assessor-types-get-response'
          description: Returns assessor types on the license
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: Invalid license id
      tags:
        - License
  /license/create/flow:
    post:
      description: This endpoint creates a new flow using a title, subtitle and a flow type
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-flow-request'
        description: Request information needed to create a flow. Title, type and managers are required. Managers are added using their userId
        required: true
      responses:
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-flow-response'
          description: A new flow has been created
      tags:
        - Flow Creation
  /license/flow-purposes:
    get:
      description: Returns a list of flow purposes associated with the license
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/license-flow-purposes-api-response'
          description: Returns a list of flow purposes associated with the license
      tags:
        - License
      x-codegen-request-body-name: body
  /license/flow-types:
    get:
      description: Returns a list of flow types associated with the license
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/license-flow-types-api-response'
          description: Returns a list of flow types associated with the license
      tags:
        - License
      x-codegen-request-body-name: body
  /license/flows/search:
    post:
      deprecated: true
      description: With this endpoint you can search for all available flows. All parameters are optional.
      operationId: searchLicenseFlows
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/flow-advanced-search-request'
        description: Use the data model to replace parameters with your search criteria
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/flow-advanced-search-response-array'
          description: Search was completed successfully
      tags:
        - License
  /license/grading-scales:
    get:
      description: Returns information about the grading scales associated with the license
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/grading-scales-response'
          description: Grading scales associated with the license
      tags:
        - License
  /license/info:
    get:
      description: Returns general information about the how the license is set up. This could be available flow types, information on coversheets, user types and marking scales.
      operationId: getLicenseInfo
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/license-info'
          description: Return general information about how the license is configured
      tags:
        - License
  /license/logs:
    get:
      description: Returns raw system logs with pagination options. Logs are sorted based on their timestamp in ascending order, which can be seen in the Sort value on the log. Note that the structure and content varies across flow types and might change over time. We do not recommend building software that depends on the log
      parameters:
        - name: offset
          in: query
          description: The offset date(unix milliseconds) to start the search from. It is recommended that the sort value returned is used for paginating through the logs
          required: false
          schema:
            type: integer
        - name: limit
          in: query
          description: The limit (maximum 10000)
          required: false
          schema:
            default: 10000
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/logs-response'
          description: Returns raw system logs for a given flow
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: Invalid query parameters
      tags:
        - System Logs
  /license/modules:
    get:
      description: Returns information about the modules associated with the license
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/modules-response'
          description: Modules associated with the license
      tags:
        - License
  /license/roles:
    get:
      description: Returns a list of roles associated with the license.
      operationId: getLicenseRoles
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/license-roles-api-response'
          description: Returns a list of roles associated with the license
      tags:
        - License
  /license/roles/{roleId}/user-count:
    get:
      description: Returns the number of users on the license with the given role
      parameters:
        - description: Identifies the role using a roleId. The roleId can be found with [/license/roles](#/License/getLicenseRoles)
          in: path
          name: roleId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/license-roles-user-count-api-response'
          description: Returns the number of users on the license with the given role
      tags:
        - License
  /license/sis/clients:
    get:
      description: Returns SIS clients associated with the license.
      operationId: getLicenseSisClients
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/sis-clients'
          description: Returns SIS clients associated with the license
      tags:
        - License
  /license/sis/flows/{sisCode}:
    get:
      deprecated: true
      description: 'Returns a list of flows with a SIS code matching the query parameter. Replaced by: [/sources/search](#/License/post_sources_search)'
      operationId: searchLicenseSisFlows
      parameters:
        - description: SIS code to search for. This value should be url-encoded and base64 encoded. A SIS code has different parameters on every license, but is usually something like {module name}||{module code}||{term}||{year}. If you do not know all parameters of the SIS code, you can use ||\*|| between two search parameters is a wildcard like this {module name}||\*||{term}||\*||. This will search for all flows having a SIS code containing the module name and the term.
          in: path
          name: sisCode
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/search-flow'
          description: Returns a list of flows with a SIS code matching the query parameter
      tags:
        - License
  /license/submissions:
    get:
      description: Returns all submissions on the license that matches the query parameters
      parameters:
        - description: Start date must be in unixtime format
          in: query
          name: start
          required: true
          schema:
            format: unixtime
            type: integer
        - description: End date must be in unixtime format. End date must be greater than start date and at most 30 days apart
          in: query
          name: end
          required: true
          schema:
            format: unixtime
            type: integer
        - description: The purpose is an enumerated descriptive field holding the aim with the flow. Examination = 0, Course Work = 1, Bachelor = 2, Master = 3
          in: query
          name: purpose
          required: true
          schema:
            format: integer
            type: integer
        - description: Whether the queried submissions should be assessed
          in: query
          name: assessed
          schema:
            default: true
            format: boolean
            type: boolean
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/submission-list'
          description: Returns an array with all submissions that matches the query parameters
        '400':
          content: {}
          description: 'The url must contain the following query parameters: start, end and purpose. The query parameter assessed must be a boolean'
      tags:
        - Submissions
  /license/user:
    post:
      description: Create new user or update existing user
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/create-user-request'
        description: Names, externalIds, roles and email are mandatory.
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-user-response'
          description: An existing user has been successfully updated
        '201':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/create-user-response'
          description: A new user has been created
        '415':
          content: {}
          description: Invalid request body (not JSON)
      tags:
        - User Management
      x-codegen-request-body-name: body
  /license/user-data-types:
    get:
      description: Returns the user data types present on the license
      operationId: getLicenseUserDataTypes
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-data-types-api-response'
          description: Returns the user data types present on the license
      tags:
        - License
  /user/eduPrincipalName/{orgId}:
    get:
      description: Returns user information based on eduPersonPrincipalName
      parameters:
        - description: Identifies a user using a eduPersonPrincipalName
          in: path
          name: orgId
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user'
          description: Returns user information based on eduPersonPrincipalName
        '404':
          content: {}
          description: No user with eduPersonPrincipalName found
      tags:
        - User Information
  /user/userDataType/{userDataType}/{value}:
    get:
      description: Returns user information based on the userDataType
      parameters:
        - description: userDataTypes can be retrieved using [/license/info](#/License/getLicenseInfo).
          in: path
          name: userDataType
          required: true
          schema:
            type: integer
        - description: The value used as an identifier
          in: path
          name: value
          required: true
          schema:
            type: string
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user'
          description: Returns user information on the userDataType and value
        '404':
          content: {}
          description: No user with data type found
      tags:
        - User Information
  /users/search:
    post:
      description: Search for users based on user data types. This endpoint allows bulk retrieval of users by providing one or more user data type filters, improving performance over individual user lookups via GET /user/userDataType/{userDataType}/{value}
      parameters:
        - description: The offset of the users fetched from the database
          in: query
          name: offset
          required: false
          schema:
            default: 0
            type: integer
        - description: The limit of the number of users fetched from the database (maximum 100)
          in: query
          name: limit
          required: false
          schema:
            default: 100
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/users-search-request'
        description: Search criteria for filtering users. Provide one or more data type filters to match users against
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/users-search-response'
          description: Returns a list of users matching the search criteria
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: Invalid request
      tags:
        - User Information
  /user/{userId}/access-token:
    post:
      description: Creates a new temporary access-token for a specific user that can be used to provide access to WISEflow by a signed URL
      parameters:
        - description: The userId of the user for whom the access-token should be generated
          in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/access-token-request'
        description: Define an expiration date for the access token (default 8 hours) and whether to automatically send the access token instantly to the user by to the provided email. Optionally set an additional password to be used at login with access token
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/access-token-response'
          description: The direct access token URL is returned together with the creation and expiration date
        '400':
          content: {}
          description: Invalid request body
        '403':
          content: {}
          description: The license does not have the access token module
        '404':
          content: {}
          description: User not found
      tags:
        - User Management
      x-codegen-request-body-name: body
  /user/{userId}/flows:
    get:
      description: Returns a list of active flows the user is related to. The flows are grouped by the users relation to the flow
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/flows'
          description: Returns a list of active flows for a user based on userId
        '404':
          content: {}
          description: User not found
      tags:
        - User Information
  /user/{userId}/flows/archived:
    get:
      description: Returns a list of archived flows the user is related to. The flows are grouped by the users relation to the flow
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/flows'
          description: Returns a list of archived flows for a user based on userId
        '404':
          content: {}
          description: User not found
      tags:
        - User Information
  /user/{userId}/info:
    get:
      description: Returns user information based on a userId.
      operationId: getUserInfo
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user'
          description: Return user information
        '404':
          content: {}
          description: User not found
      tags:
        - User Information
  /user/{userId}/notifications:
    get:
      description: Returns a list of all notifications sent to the user. Notification data is kept for 60 days.
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notifications'
          description: Returns a list of notifications
        '404':
          content: {}
          description: User not found
      tags:
        - User Information
  /user/{userId}/notifications/range:
    get:
      description: Returns a list of notifications within a given range. See /user/{userId}/notifications for data retention.
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
        - description: Start date must be in unixtime format
          in: query
          name: startDate
          schema:
            format: unixtime
            type: integer
        - description: End date must be in unixtime format
          in: query
          name: endDate
          schema:
            format: unixtime
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/notifications'
          description: Returns a list of notifications for a given userId and start and end date
        '400':
          content: {}
          description: Invalid query parameters
        '404':
          content: {}
          description: User not found
      tags:
        - User Information
  /users/{userId}:
    get:
      description: Returns basic information about the user
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/basis-user-api-response'
          description: Returns basic information about the user
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: Invalid query parameters
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: User not found
      tags:
        - User Management
    delete:
      description: |-
        This endpoint is disabled by default and can only be activated by contacting our support.

         This endpoint permanently deletes a user and all associated data from the system. It is intended for irreversible deletions, so once this action is performed, it cannot be undone. All records, logs, and related data linked to the user will be permanently erased and will not be recoverable.
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/return-no-data-api-response'
          description: Returns response with success and errors
        '403':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: Not allowed - License setting not enabled
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: User not found
      tags:
        - User Management
    put:
      description: Updates basic info on the user
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/update-basis-user-request'
        description: Basic info to update on the user. Values that are the same as already present on the user are not updated. If an empty phone is provided, the phone on the user is deleted (provided it exists)
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/basis-user-api-response'
          description: Returns the updated user
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: Invalid query parameters or validation errors
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: User not found
      tags:
        - User Management
      x-codegen-request-body-name: body
  /users/{userId}/emails:
    get:
      description: Returns emails for the user
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-email-api-response'
          description: Returns emails for the user
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: Invalid query parameters
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: User not found
      tags:
        - User Management
    patch:
      description: Updates emails on the user. Will end in an error if 2 identical emails/emailIds are sent or more than one primary email is sent. If a primary email is sent, all other primary emails on the user will be marked as non-primary. It is not possible to update to an email that already exists on the user. Furthermore, if the license requires unique emails, it is not possible to update an email to one that is already on another user either. If a deactivated email is set to be primary, an activation email is sent
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/update-user-email-request'
              type: array
        description: Emails to update
        required: true
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/user-email-api-response'
          description: Successfully updated emails are returned in the data field. Success will be set to false if any errors occurred, but data could still contain a list of successfully updated emails
        '400':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: Invalid query parameters or validation errors
        '404':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/general-api-error-response'
          description: User not found
      tags:
        - User Management
      x-codegen-request-body-name: body
    post:
      description: Creates emails on the user. Will end in an error if 2 identical emails are sent or more than one primary email is sent. If a new primary email is sent, all other primary emails on the user will be marked as non-primary. It is not possible to add an email that already exists on the user. Furthermore, if the license requires unique emails, it is not possible to add an email that is already on another user either. If the email to create is not primary, it will be activated by default. If the email is primary and license has standard login, it is deactivated and an activation email is sent
      parameters:
        - description: Identifies the user
          in: path
          name: userId
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              items:
                $ref: '#/components/schemas/create-user-email-request'
              type: array
