        title:
          description: Title (or part of)
          format: string
          type: string
        subtitle:
          description: Subtitle (or part of)
          format: string
          type: string
        code:
          description: Code (exact)
          format: string
          type: string
        participantStartDate:
          description: Participant start date (Epoch time)
