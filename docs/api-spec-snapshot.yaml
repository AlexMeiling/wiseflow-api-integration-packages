      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
          properties:
            auditEvents:
              type: array
              items:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                  triggeredBy:
                    type: object
                    properties:
                      userId:
                        type: integer
                        example: 1
                  grade:
                    type: object
                    properties:
                      value:
                        type: integer
                        example: 1
                      scaleId:
                        type: integer
                        example: 1
                    nullable: true
                  score:
                    type: string
                    example: '20'
                    nullable: true
                  points:
                    type: string
                    example: '20'
                    nullable: true
                  markingAuditNote:
                    type: string
                    nullable: true
                  assessorUserId:
                    type: integer
                    example: 1
                    nullable: true
                  type:
                    description: |
                      | Type | Payload |
                      | ------- | --------|
                      | assessor.audit.log.submit.grade | name: string, <br> grade: ?{scaleId:int, value:string}, <br> note: ?string <br> points: ?int <br><br>|
                      | assessor.audit.log.remove.grade | name: string, <br> grade: ?{scaleId:int, value:string}, <br> note: ?string <br><br>|
                      | assessor.audit.log.conflicting.grade | name: string, <br> grade: ?{scaleId:int, value:int} <br>  <br>|
                      | assessor.audit.log.finalized.grade | name: string, <br> grade: ?{scaleId:int, value:int} <br> <br>|
                      | assessor.audit.log.submit.rubric | name: string, <br> points: ?string <br><br>|
                      | assessor.audit.log.submit.score | name: string, <br> score: int, <br> note: ?string <br> <br>|
                      | assessor.audit.log.conflicting.score | name: string, <br> score: int <br><br>|
                      | reviewer.audit.log.finalized.grade | name: string, <br> grade: ?{scaleId:int, value:int}, <br> note: ?string <br><br>|
                      | reviewer.audit.log.remove.grade | name: string, <br> grade: ?{scaleId:int, value:int}, <br> note: ?string <br><br>|
                      | reviewer.audit.log.remove.grade | name: string, <br> grade: ?{scaleId:int, value:int}, <br> note: ?string <br><br>|
                      | manager.audit.log.add.assessor | name: string, <br> assessorName: string <br><br>|
                      | manager.audit.log.remove.assessor | name: string, <br> assessorName: string <br><br>|
                      | manager.audit.log.unlock.grade | name: string, <br> grade: ?{scaleId:int, value:int} <br>  <br>|
                      | manager.audit.log.submit.grade | name: string, <br> grade: ?{scaleId:int, value:int} <br>  <br>|
                      | manager.audit.log.reopened.rubric | name: string, <br> points: ?string <br><br>|
                      | manager.audit.log.unlock.score | name: string, <br> score: ?string <br><br>|
                      | manager.audit.log.modify.matrix | name: string |
                    type: string
                    example: ' assessor.audit.log.submit.grade'
                  timestamp:
                    type: integer
                    format: unix
                    example: 1649069843
        pagination:
          type: object
          properties:
            offset:
              type: integer
              example: 10
            limit:
              default: 10
              maximum: 100
              type: integer
              example: 100
            total:
