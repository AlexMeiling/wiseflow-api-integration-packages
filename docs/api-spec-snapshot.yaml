    post:
      description: |-
        Add one or more users to a flow as participant. This is the modern replacement for POST /flow/{flowId}/participants/add, providing richer response data and improved error handling.

         To identify the user, provide one of: userId, email (if the license is setup with unique emails), or userData information.

         Each entry in the response corresponds to the request entry at the same index. On success, the response includes participant and user details. On failure, the response includes an error code indicating the reason
