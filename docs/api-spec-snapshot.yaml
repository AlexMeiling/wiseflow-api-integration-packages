  /flows/{flowId}/dfba/participants:
    get:
      tags:
        - Direct Flow Based Authentication
      description: Returns the Direct Flow Based Authentication (DFBA) data of participants for a specific flow
      parameters:
        - description: Identifies the flow
          in: path
          name: flowId
          required: true
          schema:
            type: integer
            example: 123
        - name: offset
          in: query
          description: The number of records to start the query from
          required: false
          schema:
            type: integer
            default: 0
        - name: limit
          in: query
          description: The number of results (maximum 100)
          required: false
          schema:
            maximum: 100
            minimum: 1
            default: 100
            type: integer
        - name: firstName
          in: query
          description: The first name of the participant used to filter results
          required: false
          schema:
            type: string
        - name: lastName
          in: query
          description: The last name of the participant used to filter results
          required: false
          schema:
            type: string
        - name: username
          in: query
          description: The username of the participant used to filter results. The username is based on the usernameType used on the flow
          required: false
          schema:
            type: string
        - name: code
          in: query
          description: The exam code of the participant used to filter results
          required: false
          schema:
            type: string
        - name: sortBy
          in: query
          description: The field to sort the results by
          required: false
          schema:
            type: string
            enum:
              - first_name
              - last_name
              - participant_id
            default: participant_id
        - name: sortDirection
          in: query
          description: The direction to sort the results by
          required: false
          schema:
            type: string
            enum:
              - asc
              - desc
            default: asc
